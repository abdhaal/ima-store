<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMA Store | Shopping Cart</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Cart Page Specific Styles */
        .cart-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        .cart-items-section, .checkout-section {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(0, 86, 179, 0.05);
            border: 1px solid #e2e8f0;
        }

        .cart-item {
            display: flex;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            margin-right: 20px;
            border: 1px solid #f0f4f8;
        }

        .item-details {
            flex: 1;
        }

        .item-details h3 {
            font-size: 18px;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .item-price {
            font-size: 16px;
            font-weight: 700;
            color: #0056b3;
            margin-bottom: 10px;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #e53e3e;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        .remove-btn:hover {
            text-decoration: underline;
        }

        /* Form & Summary Styling */
        .section-subtitle {
            font-size: 20px;
            color: #1a202c;
            margin-bottom: 20px;
            font-weight: 700;
            border-bottom: 2px solid #f0f4f8;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
            color: #4a5568;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: #0056b3;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
            color: #4a5568;
        }

        .total-row {
            border-top: 2px dashed #e2e8f0;
            padding-top: 15px;
            margin-top: 15px;
            font-weight: 700;
            font-size: 18px;
            color: #1a202c;
        }

        .btn-order {
            width: 100%;
            padding: 14px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }

        .btn-order:hover {
            background-color: #003d82;
        }

        @media (max-width: 768px) {
            .cart-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="navbar">
            <div class="logo" style="cursor:pointer;" onclick="window.location.href='index.html'">IMA Store</div>
            <div class="search-box">
                <input type="text" placeholder="Search for products...">
                <button><i class="fa fa-search"></i></button>
            </div>
            <div class="nav-links">
                <a href="index.html"><i class="fa fa-home"></i> Home</a>
                <a href="#" class="cart-icon">
                    <i class="fa fa-shopping-cart"></i> Cart
                    <span id="cart-count">1</span>
                </a>
            </div>
        </div>
    </header>

    <main>
        <div class="cart-container">
            <div>
                <div class="cart-items-section" style="margin-bottom: 25px;">
                    <h2 class="section-subtitle">Shopping Cart (1 Item)</h2>
                    
                    <div class="cart-item">
                        <img src="https://picsum.photos/200/200?random=2" alt="Smart Watch">
                        <div class="item-details">
                            <h3>IMA Premium Smart Watch (Gen 5)</h3>
                            <div class="item-price">₹1,499</div>
                            <button class="remove-btn" onclick="alert('Item removed!')"><i class="fa fa-trash"></i> Remove</button>
                        </div>
                    </div>
                </div>

                <div class="cart-items-section">
                    <h2 class="section-subtitle">Delivery Address</h2>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Enter your name">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" placeholder="Enter 10-digit mobile number">
                    </div>
                    <div class="form-group">
                        <label>Shipping Address</label>
                        <textarea rows="3" placeholder="Flat No, Street Name, Area..."></textarea>
                    </div>
                </div>
            </div>

            <div class="checkout-section">
                <h2 class="section-subtitle">Price Details</h2>
                <div class="summary-row">
                    <span>Price (1 Item)</span>
                    <span>₹1,499</span>
                </div>
                <div class="summary-row">
                    <span>Delivery Charges</span>
                    <span style="color: #2e7d32; font-weight: 600;">FREE</span>
                </div>
                <div class="summary-row">
                    <span>Platform Fee</span>
                    <span>₹2</span>
                </div>
                
                <div class="summary-row total-row">
                    <span>Total Amount</span>
                    <span style="color: #0056b3;">₹1,501</span>
                </div>

                <button class="btn-order" onclick="alert(' 🎉 Order Placed Successfully at IMA Store! Thank you.')">
                    Place Order (COD)
                </button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 IMA Store. All Rights Reserved.</p>
    </footer>

</body>
  </html>
