<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success | IMA Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .success-container {
            max-width: 600px;
            margin: 60px auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 86, 179, 0.08);
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .success-icon {
            font-size: 70px;
            color: #2e7d32; /* Green Success Color */
            margin-bottom: 20px;
        }

        .success-container h1 {
            font-size: 28px;
            color: #1a202c;
            margin-bottom: 15px;
        }

        .success-container p {
            color: #4a5568;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .order-id {
            background-color: #f4f7fc;
            color: #0056b3;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 35px;
            border: 1px dashed #0056b3;
        }

        .btn-continue {
            padding: 14px 30px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-continue:hover {
            background-color: #003d82;
        }
    </style>
</head>
<body>

    <header>
        <div class="navbar">
            <div class="logo" style="cursor:pointer;" onclick="window.location.href='index.html'">IMA Store</div>
            <div class="nav-links">
                <a href="index.html"><i class="fa fa-home"></i> Home</a>
            </div>
        </div>
    </header>

    <main>
        <div class="success-container">
            <div class="success-icon">
                <i class="fa fa-check-circle"></i>
            </div>
            <h1>Order Placed Successfully!</h1>
            <p>Thank you for shopping at IMA Store. Your order has been confirmed and will be shipped out within 24 hours. A confirmation SMS has been sent to your mobile number.</p>
            
            <div>
                <span class="order-id">Order ID: #IMA-987452</span>
            </div>

            <a href="index.html" class="btn-continue"><i class="fa fa-shopping-bag"></i> Continue Shopping</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 IMA Store. All Rights Reserved.</p>
    </footer>

</body>
</html>
