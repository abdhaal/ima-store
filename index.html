<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMA Store | Online Shopping</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome Icons-kaga -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Header & Navigation -->
    <header>
        <div class="navbar">
            <div class="logo">IMA Store</div>
            <div class="search-box">
                <input type="text" placeholder="Search for products, brands and more...">
                <button><i class="fa fa-search"></i></button>
            </div>
            <div class="nav-links">
                <a href="#"><i class="fa fa-user"></i> Login</a>
                <a href="#" class="cart-icon">
                    <i class="fa fa-shopping-cart"></i> Cart
                    <span id="cart-count">0</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Banner Section -->
    <section class="banner">
        <div class="banner-content">
            <h2>Welcome to IMA Store</h2>
            <p>Meesho & Amazon Mathiri Top Quality Products, Lowest Price!</p>
            <button class="shop-now-btn">Shop Now</button>
        </div>
    </section>

    <!-- Products Section -->
    <main>
        <h1 class="section-title">Trending Products</h1>
        <div class="products-container" id="products-grid">
            <!-- Products dynamic-ah JavaScript vazhiya inga varum -->
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 IMA Store. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
